<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — DeepShield AI</title>
    <meta name="description" content="Admin dashboard for managing users and viewing system statistics.">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
                <path d="M10 16.5C10 13 12.5 10 16 10C19.5 10 22 13 22 16.5C22 20 19.5 22 16 22" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="14" cy="15" r="1.5" fill="#06d6a0"/>
                <circle cx="18" cy="15" r="1.5" fill="#8b5cf6"/>
                <defs>
                    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
                        <stop stop-color="#06d6a0"/>
                        <stop offset="0.5" stop-color="#3b82f6"/>
                        <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
            </svg>
            DeepShield AI
        </a>
        <ul class="navbar-links" id="auth-links">
            <a href="/admin.html" class="active">Admin</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="#" onclick="handleLogout(); return false;">Logout</a>
        </ul>
    </nav>

    <!-- Admin Dashboard -->
    <div class="dashboard">
        <div class="dashboard-header">
            <h1>Admin Panel 🛡️</h1>
            <p>Manage users and monitor system activity</p>
        </div>

        <div style="max-width: 1200px; margin: 0 auto; padding: 0 var(--space-xl) var(--space-2xl);">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-value" id="stat-total-users">—</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="stat-active-users">—</div>
                    <div class="stat-label">Active Users</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="stat-total-predictions">—</div>
                    <div class="stat-label">Total Predictions</div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-value" id="stat-recent-signups">—</div>
                    <div class="stat-label">New This Week</div>
                </div>
            </div>

            <!-- User Management -->
            <div class="glass-card">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-xl); flex-wrap: wrap; gap: 1rem;">
                    <h2 style="font-size: 1.3rem; font-weight: 700;">User Management</h2>
                    <button class="btn btn-secondary btn-sm" onclick="loadUsers(); loadStats();">
                        🔄 Refresh
                    </button>
                </div>

                <!-- Search -->
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="user-search" placeholder="Search by name, email, or role...">
                </div>

                <!-- Users Table -->
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Logins</th>
                                <th>Predictions</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                    <span class="spinner"></span> Loading users...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 DeepShield AI — Admin Panel</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
