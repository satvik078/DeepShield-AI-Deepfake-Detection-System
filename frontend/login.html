<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DeepShield AI</title>
    <meta name="description" content="Sign in to your DeepShield AI account to start detecting deepfakes.">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
                <path d="M10 16.5C10 13 12.5 10 16 10C19.5 10 22 13 22 16.5C22 20 19.5 22 16 22" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="14" cy="15" r="1.5" fill="#06d6a0"/>
                <circle cx="18" cy="15" r="1.5" fill="#8b5cf6"/>
                <defs>
                    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
                        <stop stop-color="#06d6a0"/>
                        <stop offset="0.5" stop-color="#3b82f6"/>
                        <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
            </svg>
            DeepShield AI
        </a>
        <ul class="navbar-links">
            <a href="/">Home</a>
            <a href="/signup.html">Sign Up</a>
        </ul>
    </nav>

    <!-- Login Form -->
    <div class="auth-page">
        <div class="glass-card auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to continue to your dashboard</p>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-input"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width: 100%;">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', redirectIfAuthed);
    </script>
</body>
</html>
