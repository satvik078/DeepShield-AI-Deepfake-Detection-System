<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — DeepShield AI</title>
    <meta name="description" content="Create a free DeepShield AI account to start detecting deepfakes.">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
                <path d="M10 16.5C10 13 12.5 10 16 10C19.5 10 22 13 22 16.5C22 20 19.5 22 16 22" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="14" cy="15" r="1.5" fill="#06d6a0"/>
                <circle cx="18" cy="15" r="1.5" fill="#8b5cf6"/>
                <defs>
                    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
                        <stop stop-color="#06d6a0"/>
                        <stop offset="0.5" stop-color="#3b82f6"/>
                        <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                </defs>
            </svg>
            DeepShield AI
        </a>
        <ul class="navbar-links">
            <a href="/">Home</a>
            <a href="/login.html">Login</a>
        </ul>
    </nav>

    <!-- Signup Form -->
    <div class="auth-page">
        <div class="glass-card auth-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Start detecting deepfakes in seconds</p>

            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label" for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" class="form-input"
                           placeholder="John Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" class="form-input"
                           placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-password">Password</label>
                    <input type="password" id="signup-password" class="form-input"
                           placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label" for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" class="form-input"
                           placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" id="signup-btn" class="btn btn-primary btn-lg" style="width: 100%;">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', redirectIfAuthed);
    </script>
</body>
</html>
